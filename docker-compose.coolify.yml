services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      POVERLAY_DATA_DIR: /data
      GOPRO_DASHBOARD_BIN: ${GOPRO_DASHBOARD_BIN:-/opt/venv/bin/gopro-dashboard.py}
      FFPROBE_BIN: ${FFPROBE_BIN:-ffprobe}
      OVERLAY_FONT_PATH: ${OVERLAY_FONT_PATH:-/app/apps/api/app/static/fonts/Orbitron-Bold.ttf}
      WEB_BASE_URL: ${WEB_BASE_URL:?}
      API_BASE_URL: ${API_BASE_URL:?}
      CORS_ORIGINS: ${CORS_ORIGINS:?}
      ADMIN_UIDS: ${ADMIN_UIDS:-}
      FIREBASE_AUTH_ENABLED: ${FIREBASE_AUTH_ENABLED:-false}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      FIREBASE_ADMIN_CLIENT_EMAIL: ${FIREBASE_ADMIN_CLIENT_EMAIL:-}
      FIREBASE_ADMIN_PRIVATE_KEY: ${FIREBASE_ADMIN_PRIVATE_KEY:-}
      FIREBASE_ADMIN_PRIVATE_KEY_BASE64: ${FIREBASE_ADMIN_PRIVATE_KEY_BASE64:-}
      FIREBASE_ADMIN_PRIVATE_KEY_PATH: ${FIREBASE_ADMIN_PRIVATE_KEY_PATH:-}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      FIRESTORE_ENABLED: ${FIRESTORE_ENABLED:-false}
      FIRESTORE_PROJECT_ID: ${FIRESTORE_PROJECT_ID:-}
      FIRESTORE_DATABASE_ID: ${FIRESTORE_DATABASE_ID:-(default)}
      FIRESTORE_COLLECTION_USERS: ${FIRESTORE_COLLECTION_USERS:-users}
      FIRESTORE_COLLECTION_JOBS: ${FIRESTORE_COLLECTION_JOBS:-jobs}
      FIRESTORE_COLLECTION_MEDIA: ${FIRESTORE_COLLECTION_MEDIA:-media}
      R2_UPLOAD_ENABLED: ${R2_UPLOAD_ENABLED:-false}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      BREVO_NOTIFICATIONS_ENABLED: ${BREVO_NOTIFICATIONS_ENABLED:-false}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-POVerlay}
      BREVO_TEMPLATE_RENDER_COMPLETE_ID: ${BREVO_TEMPLATE_RENDER_COMPLETE_ID:-}
      JOB_OUTPUT_RETENTION_HOURS: ${JOB_OUTPUT_RETENTION_HOURS:-24}
      JOB_CLEANUP_INTERVAL_SECONDS: ${JOB_CLEANUP_INTERVAL_SECONDS:-900}
      JOB_CLEANUP_ENABLED: ${JOB_CLEANUP_ENABLED:-true}
      JOB_RECOVERY_INTERVAL_SECONDS: ${JOB_RECOVERY_INTERVAL_SECONDS:-45}
      JOB_QUEUE_WORKER_COUNT: ${JOB_QUEUE_WORKER_COUNT:-0}
      FFMPEG_THREADS_PER_RENDER: ${FFMPEG_THREADS_PER_RENDER:-0}
      LOCAL_RENDER_ENABLED: ${LOCAL_RENDER_ENABLED:-false}
      JOB_DATABASE_CLEANUP_ENABLED: ${JOB_DATABASE_CLEANUP_ENABLED:-true}
      JOB_DATABASE_CLEANUP_INTERVAL_SECONDS: ${JOB_DATABASE_CLEANUP_INTERVAL_SECONDS:-3600}
      JOB_DATABASE_RETENTION_DAYS: ${JOB_DATABASE_RETENTION_DAYS:-30}
      DELETE_INPUTS_ON_COMPLETE: ${DELETE_INPUTS_ON_COMPLETE:-true}
      DELETE_WORK_ON_COMPLETE: ${DELETE_WORK_ON_COMPLETE:-true}
    volumes:
      - pov_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8787/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    expose:
      - "8787"

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?}
        NEXT_PUBLIC_FIREBASE_AUTH_ENABLED: ${NEXT_PUBLIC_FIREBASE_AUTH_ENABLED:-false}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8787}
        NEXT_PROXY_CLIENT_MAX_BODY_SIZE: ${NEXT_PROXY_CLIENT_MAX_BODY_SIZE:-64gb}
        NEXT_PROXY_TIMEOUT_MS: ${NEXT_PROXY_TIMEOUT_MS:-1800000}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?}
      NEXT_PUBLIC_FIREBASE_AUTH_ENABLED: ${NEXT_PUBLIC_FIREBASE_AUTH_ENABLED:-false}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PROXY_CLIENT_MAX_BODY_SIZE: ${NEXT_PROXY_CLIENT_MAX_BODY_SIZE:-64gb}
      NEXT_PROXY_TIMEOUT_MS: ${NEXT_PROXY_TIMEOUT_MS:-1800000}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8787}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    expose:
      - "3000"

volumes:
  pov_data:
